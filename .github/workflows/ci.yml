name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify imports
        run: python -c "import api; import database; import engine; import seed; print('All imports OK')"

      - name: Test database init
        run: python -c "import database; database.init_db(); print('Database OK')"

      - name: Test seed
        run: python -c "from seed import seed_models; seed_models(); print('Seed OK')"

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t markovify:${{ github.sha }} .

      - name: Test Docker container
        run: |
          docker run -d --name markovify-test -p 8000:8000 markovify:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop markovify-test
          docker rm markovify-test
